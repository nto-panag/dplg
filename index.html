        /* ΚΟΙΝΟ ΣΤΥΛ ΓΙΑ ΟΛΑ ΤΑ ΠΑΝΕΛ (ΥΨΟΣ 620px) */
        .panel {
            background: var(--dark-bg);
            border-radius: 6px;
            padding: 11px;
            height: 620px; /* Όλα τα box στο ίδιο μήκος */
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-sizing: border-box;

        .right-panel { border: 1px solid #554; flex: 1; max-width: 640px; background: var(--input-bg); }
        .black-list-panel { border: 1.1px solid var(--black-red); flex: 0 0 210px; }

        /* TEXTAREAS */
        textarea, input { 
            width: 100%; 
            background: var(--input-bg); 
            color: #ffffff !important; 
            border: 1px solid #554; 
            padding: 7px; 
            box-sizing: border-box; 
            font-size: 14px; 
            outline: none;

        .black-box { height: 110%; resize: none; color: #ffffff !important; font-weight: bold; text-align: center; white-space: pre-wrap; overflow-y: auto; cursor: default; font-size: 14px; }

}

        /* GRID ΚΑΙ ΚΟΥΜΠΙΑ */

        .date-container {

            border: 1px solid var(--accent);

            text-align: center;

        .date-container label { font-size: 10px; color: var(--accent); text-transform: uppercase; display: block; }
        .date-container input { border: none; text-align: center; height: 28px; }

        .btn { background: var(--accent); color: #1a1a1a; border: none; padding: 10px 5px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .export-btn { background: #d4a017; width: auto; padding: 10px 40px; margin: 10px auto; display: block; }

<script>
function cleanData() {
    const text = document.getElementById('rawData').value;
    const lines = text.split('\n');
    let result = [];
    lines.forEach(line => {
        let l = line.trim();
        if (!l || l.length < 3) return;
        l = l.replace(/\t/g, ' ').replace(/\s+/g, ' ');
        let nameMatch = l.match(/^[a-zA-Z._\s-]+/);
        if (nameMatch) {
            let name = nameMatch[0].trim();
            const blacklist = ["Rank", "Όνομα", "Name", "Πόντοι", "Points", "Χωριά", "Villages"];
            if (name.length > 2 && !blacklist.includes(name)) result.push(name);
        }
    });
    document.getElementById('finalList').value = [...new Set(result)].join('\n');
}

function buildMessage() {
    const player = document.getElementById('pPlayer').value.replace('ΠΑΙΚΤΗΣ:', '').trim();
    const timeVal = document.getElementById('pTime').value;
    const n1 = document.getElementById('pNote1').value.replace('ΣΗΜΕΙΩΣΗ 1:', '').trim();
    const n2 = document.getElementById('pNote2').value.replace('ΣΗΜΕΙΩΣΗ 2:', '').trim();
    const rawList = document.getElementById('finalList').value.trim();
    let timeStr = "---";
    if (timeVal) {
        let d = new Date(timeVal);
        timeStr = String(d.getDate()).padStart(2, '0') + "/" + String(d.getMonth() + 1).padStart(2, '0') + "/" + d.getFullYear() + " " + d.toTimeString().split(' ')[0];
    }
    let msg = "ΠΡΟΣ: [player]" + player + "[/player]\n--------------------------------------\n[color=#ff0000][b]ΩΡΑ ΕΠΙΘΕΣΗΣ: " + timeStr + "[/b][/color]\n";
    if(n1) msg += "[b]" + n1 + "[/b]\n";
    if(n2) msg += "[b]" + n2 + "[/b]\n";
    msg += "--------------------------------------\n\n";
    rawList.split('\n').forEach(line => {
        let match = line.match(/(\d{3})\|(\d{3})/);
        if (match) msg += "[claim]" + match[1] + "|" + match[2] + "[/claim]\n";
    });
    const output = document.getElementById('pFinalOutput');
    output.readOnly = false;
    output.value = msg.trim();
}

function copyResult() {
    const out = document.getElementById('pFinalOutput');
    if(!out.value) return;
    out.select();
    document.execCommand('copy');
    alert("Αντιγράφηκε!");
}
</script>
