<script>
function cleanData() {
    const text = document.getElementById('rawData').value;
    const lines = text.split('\n');
    let result = [];

    lines.forEach(line => {
        let l = line.trim();
        if (!l || l.length < 3) return;

        // 1. Καθαρίζουμε τα Tab και τα πολλά κενά
        l = l.replace(/\t/g, ' ').replace(/\s+/g, ' ');

        // 2. Πάρε ό,τι υπάρχει πριν από τον πρώτο αριθμό (Points/Rank)
        // Αυτό θα πιάσει όλο το "King of seles" ή "Da Vinci"
        let nameMatch = l.match(/^[a-zA-Z._\s-]+/);
        
        if (nameMatch) {
            let name = nameMatch[0].trim();
            
            // 3. Φιλτράρισμα άχρηστων λέξεων
            const blacklist = ["Rank", "Όνομα", "Name", "Πόντοι", "Points", "Χωριά", "Villages"];
            if (name.length > 2 && !blacklist.includes(name)) {
                result.push(name);
            }
        }
    });

    // 4. Καθαρισμός από διπλότυπα
    let uniqueResults = [...new Set(result)];
    
    // ΠΡΟΣΟΧΗ: Εδώ το ID πρέπει να είναι 'finalList' για να δουλέψει στο HTML σου!
    document.getElementById('finalList').value = uniqueResults.join('\n');
}
    function buildMessage() {
        const player = document.getElementById('pPlayer').value.trim();
        const timeVal = document.getElementById('pTime').value;
        const n1 = document.getElementById('pNote1').value.trim();
        const n2 = document.getElementById('pNote2').value.trim();
        const rawList = document.getElementById('finalList').value.trim();
        let timeStr = "---";
        if (timeVal) {
            let d = new Date(timeVal);
            let day = String(d.getDate()).padStart(2, '0');
            let month = String(d.getMonth() + 1).padStart(2, '0');
            let year = d.getFullYear();
            let time = d.toTimeString().split(' ')[0];
            timeStr = day + "/" + month + "/" + year + " " + time;
        }
        let msg = "ΠΡΟΣ: [player]" + player + "[/player]\n";
        msg += "--------------------------------------\n";
        msg += "[color=#ff0000][b]ΩΡΑ ΕΠΙΘΕΣΗΣ: " + timeStr + "[/b][/color]\n";
        if(n1) msg += "[b]ΣΗΜΕΙΩΣΗ 1: " + n1 + "[/b]\n";
        if(n2) msg += "[b]ΣΗΜΕΙΩΣΗ 2: " + n2 + "[/b]\n";
        msg += "--------------------------------------\n\n";
        const lines = rawList.split('\n');
        lines.forEach(line => {
            let match = line.match(/(\d{3})\|(\d{3})/);
            if (match) msg += "[claim]" + match[1] + "|" + match[2] + "[/claim]\n";
        });
        document.getElementById('pFinalOutput').value = msg.trim();
    }

    function copyResult() {
        const out = document.getElementById('pFinalOutput');
        if(!out.value) return;
        out.select();
        document.execCommand('copy');
        alert("Αντιγράφηκε!");
    }
</script>
